<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wc7ebmnu6p");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>Masterclass Library — Scale Enterprises</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    /* Module card icons */
    .module-icon {
      width: 56px; height: 56px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .module-card:hover .module-icon {
      transform: scale(1.1) rotate(-3deg);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .module-icon svg {
      width: 28px; height: 28px;
    }

    /* Card entrance animation */
    .module-card {
      opacity: 0;
      transform: translateY(20px);
      animation: cardIn 0.5s ease forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stagger each card */
    .module-card:nth-child(1) { animation-delay: 0.05s; }
    .module-card:nth-child(2) { animation-delay: 0.1s; }
    .module-card:nth-child(3) { animation-delay: 0.15s; }
    .module-card:nth-child(4) { animation-delay: 0.2s; }
    .module-card:nth-child(5) { animation-delay: 0.25s; }
    .module-card:nth-child(6) { animation-delay: 0.3s; }
    .module-card:nth-child(7) { animation-delay: 0.35s; }
    .module-card:nth-child(8) { animation-delay: 0.4s; }

    /* Gold shimmer on hover */
    .module-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px; border-radius: 0.75rem 0.75rem 0 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .module-card:hover::before { opacity: 1; }
    .module-card { position: relative; overflow: hidden; }

    /* Audiobook banner */
    .audiobook-banner {
      background: linear-gradient(135deg, rgba(240,192,48,0.08), rgba(240,192,48,0.02));
      border: 1px solid rgba(240,192,48,0.2);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex; align-items: center; gap: 1.25rem;
      transition: border-color 0.3s;
    }
    .audiobook-banner:hover { border-color: rgba(240,192,48,0.4); }
    .audiobook-banner-icon {
      width: 48px; height: 48px; flex-shrink: 0;
      background: rgba(240,192,48,0.15); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .audiobook-banner-icon svg { width: 24px; height: 24px; color: var(--gold); }
    .audiobook-banner-text h3 {
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1rem;
      color: var(--white); margin-bottom: 0.25rem;
    }
    .audiobook-banner-text p { color: var(--muted); font-size: 0.85rem; }
    .audio-banner-btn {
      margin-left: auto;
      background: var(--gold); color: var(--black);
      font-weight: 700; font-size: 0.8rem;
      padding: 0.6rem 1.25rem; border-radius: 4px;
      text-decoration: none; white-space: nowrap;
      transition: filter 0.2s;
    }
    .audiobook-banner-btn:hover { filter: brightness(1.1); }

    .module-card.locked {
      opacity: 0.45;
      pointer-events: none;
      filter: grayscale(0.3);
    }
    .module-status.locked {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .main > div[style*="grid-template-columns: 1fr 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>
<body>

  <!-- Top Nav -->
  <nav class="topnav" id="topnav"></nav>

  <!-- Main -->
  <main class="main" id="mainContent">
    <div class="loading" id="loader"><div class="spinner"><img src="/logo.png" alt="Loading"></div></div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/topnav.js"></script>
  <script>
    // Module icon SVGs mapped by slug — matching free-course landing page
    var MODULE_ICONS = {
      'how-it-started': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="10" r="6"/><path d="M4 28c0-6.627 5.373-12 12-12s12 5.373 12 12"/></svg>',
      'enterprise-framework': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4L4 10l12 6 12-6L16 4z"/><path d="M4 16l12 6 12-6"/><path d="M4 22l12 6 12-6"/></svg>',
      'enterprise-checklist': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="24" height="24" rx="3"/><polyline points="10 16 14 20 22 12"/></svg>',
      'scaling-sequence': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="16" r="12"/><polyline points="16 8 16 16 22 19"/></svg>',
      'real-results': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 4h12v10c0 3.3-2.7 6-6 6s-6-2.7-6-6V4z"/><path d="M10 8H6c0 4 2 6 4 7"/><path d="M22 8h4c0 4-2 6-4 7"/><line x1="16" y1="20" x2="16" y2="25"/><path d="M11 25h10v2H11z"/></svg>',
      'stage-one-value-creation': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 28V15"/><path d="M16 15c-4 0-7-4-7-8" /><path d="M16 19c4 0 7-4 7-8"/><path d="M13 28h6"/></svg>',
      'stage-two-systems': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="16" r="6"/><path d="M16 7v3m0 12v3M7 16h3m12 0h3M9.34 9.34l2.12 2.12m9.08 9.08l2.12 2.12M22.66 9.34l-2.12 2.12M11.46 20.54l-2.12 2.12"/></svg>',
      'stage-three-enterprise-leadership': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="16,3 19.5,11 28,12 22,18.5 23.5,27 16,23 8.5,27 10,18.5 4,12 12.5,11"/></svg>',
      'stage-four-platform': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="16" r="3"/><circle cx="6" cy="8" r="2"/><circle cx="26" cy="8" r="2"/><circle cx="6" cy="24" r="2"/><circle cx="26" cy="24" r="2"/><circle cx="16" cy="4" r="2"/><circle cx="16" cy="28" r="2"/><line x1="16" y1="13" x2="16" y2="6"/><line x1="16" y1="26" x2="16" y2="19"/><line x1="13.5" y1="14.5" x2="7.5" y2="9.5"/><line x1="18.5" y1="14.5" x2="24.5" y2="9.5"/><line x1="13.5" y1="17.5" x2="7.5" y2="22.5"/><line x1="18.5" y1="17.5" x2="24.5" y2="22.5"/></svg>',
      'stage-five-private-equity': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h24"/><path d="M4 22V12l6 5 6-9 6 9 6-5v10"/></svg>'
    };

    var MODULE_COLORS = {
      'how-it-started': '#818cf8',
      'enterprise-framework': '#f59e0b',
      'enterprise-checklist': '#22c55e',
      'scaling-sequence': '#22d3ee',
      'stage-one-value-creation': '#818cf8',
      'stage-two-systems': '#f59e0b',
      'stage-three-enterprise-leadership': '#22c55e',
      'stage-four-platform': '#22d3ee',
      'stage-five-private-equity': '#a78bfa',
      'real-results': '#ec4899'
    };

    document.addEventListener('auth:ready', async function(e) {
      const user = e.detail;
      const modules = await initTopnav('library');

      const completed = modules.filter(m => m.completed).length;
      const total = modules.length;
      const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <div style="text-align:center;margin-bottom:2.5rem;padding:2rem 1rem 0;">
          <h1 style="font-family:'Sora',sans-serif;font-size:clamp(1.6rem,4vw,2.8rem);font-weight:800;color:var(--white);line-height:1.15;margin:0 0 0.75rem;">Take Control of Your Business<br>So You Can Reach Your Full Potential</h1>
          <p style="color:var(--muted);font-size:1.05rem;margin:0;">Welcome back, ${user.firstName}</p>
        </div>

        <div class="progress-wrap">
          <div class="progress-header">
            <span class="progress-label">Course Progress</span>
            <span class="progress-count">${completed} of ${total} complete</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
        </div>

        <!-- PDF Download + Audio + Video Coming Soon -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:2rem;">
          <a href="/enterprise-playbook.pdf" target="_blank" class="audiobook-banner" style="margin-bottom:0;text-decoration:none;color:inherit;">
            <div class="audiobook-banner-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <polyline points="9 15 12 18 15 15"/>
              </svg>
            </div>
            <div class="audiobook-banner-text">
              <h3>Download PDF</h3>
              <p>Get the full Enterprise Playbook as a PDF.</p>
            </div>
            <span class="audio-banner-btn">Download</span>
          </a>
          <div class="audiobook-banner" style="margin-bottom:0;">
            <div class="audiobook-banner-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
              </svg>
            </div>
            <div class="audiobook-banner-text">
              <h3>Audio Version</h3>
              <p>Listen on the go.</p>
            </div>
            <span class="audio-banner-btn" style="cursor:default;opacity:0.8;">Coming Soon</span>
          </div>
          <div class="audiobook-banner" style="margin-bottom:0;">
            <div class="audiobook-banner-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
            </div>
            <div class="audiobook-banner-text">
              <h3>Video Version</h3>
              <p>Watch the video series.</p>
            </div>
            <span class="audio-banner-btn" style="cursor:default;opacity:0.8;">Coming Soon</span>
          </div>
        </div>

        <div class="module-grid">
          ${modules.map((m, i) => {
            var color = m.iconColor || MODULE_COLORS[m.slug] || '#F0C030';
            var icon = MODULE_ICONS[m.slug] || MODULE_ICONS.vision;
            var unlocked = i === 0 || modules[i - 1].completed;
            var status = m.completed
              ? '<span class="module-status completed">&#10003; Completed</span>'
              : unlocked
                ? '<span class="module-status start">Start Now &rarr;</span>'
                : '<span class="module-status locked"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Finish Previous Module</span>';
            return `
            <a href="${unlocked || m.completed ? '/' + m.slug : '#'}" class="module-card card card-hover${!unlocked && !m.completed ? ' locked' : ''}" ${!unlocked && !m.completed ? 'data-locked="true"' : ''}>
              <div class="module-icon" style="background:${color}15;">
                <span style="color:${color};">${icon}</span>
              </div>
              <div class="module-number">Module ${String(i + 1).padStart(2, '0')}</div>
              <div class="module-title">${m.title}</div>
              <div class="module-desc">${m.description}</div>
              ${status}
            </a>
          `;}).join('')}
        </div>
        <a href="#" id="e360Card" style="display:flex;align-items:center;justify-content:center;gap:1.5rem;width:100%;margin-top:1.5rem;padding:2rem 2.5rem;background:linear-gradient(135deg,rgba(240,192,48,0.08) 0%,rgba(240,192,48,0.03) 100%);border:1px solid rgba(240,192,48,0.25);border-radius:16px;text-decoration:none;color:inherit;transition:all 0.25s;cursor:pointer;text-align:center;flex-wrap:wrap;">
          <img src="/logo.png" alt="Scale Enterprises" style="width:52px;height:52px;object-fit:contain;filter:brightness(0) saturate(100%) invert(79%) sepia(55%) saturate(500%) hue-rotate(5deg) brightness(105%) contrast(95%);flex-shrink:0;">
          <div style="flex:1;min-width:200px;text-align:left;">
            <div style="font-family:Sora,sans-serif;font-weight:700;font-size:0.65rem;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.35rem;">The Program</div>
            <div style="font-family:Sora,sans-serif;font-weight:700;font-size:1.2rem;color:var(--white);margin-bottom:0.3rem;">Enterprise 360</div>
            <div style="color:var(--muted);font-size:0.85rem;line-height:1.5;">The full 30-day business transformation. Every system installed. Two guarantees &mdash; or you don&rsquo;t pay. $100,000 of value.</div>
          </div>
          <span style="display:inline-flex;align-items:center;gap:0.4rem;font-size:0.85rem;font-weight:600;padding:0.6rem 1.5rem;border-radius:9999px;background:rgba(240,192,48,0.15);color:var(--gold);flex-shrink:0;white-space:nowrap;">Learn More &rarr;</span>
        </a>
      `;

      var e360 = document.getElementById('e360Card');
      e360.addEventListener('click', function(e) {
        e.preventDefault();
        openComingSoonModal();
      });
      e360.addEventListener('mouseenter', function() { e360.style.borderColor = 'rgba(240,192,48,0.5)'; e360.style.background = 'linear-gradient(135deg,rgba(240,192,48,0.12) 0%,rgba(240,192,48,0.05) 100%)'; });
      e360.addEventListener('mouseleave', function() { e360.style.borderColor = 'rgba(240,192,48,0.25)'; e360.style.background = 'linear-gradient(135deg,rgba(240,192,48,0.08) 0%,rgba(240,192,48,0.03) 100%)'; });
    });
  </script>
</body>
</html>
