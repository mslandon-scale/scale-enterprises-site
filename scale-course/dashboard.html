<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wc7ebmnu6p");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>Masterclass Library — Scale Enterprises</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    /* Module card icons */
    .module-icon {
      width: 56px; height: 56px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .module-card:hover .module-icon {
      transform: scale(1.1) rotate(-3deg);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .module-icon svg {
      width: 28px; height: 28px;
    }

    /* Card entrance animation */
    .module-card {
      opacity: 0;
      transform: translateY(20px);
      animation: cardIn 0.5s ease forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stagger each card */
    .module-card:nth-child(1) { animation-delay: 0.05s; }
    .module-card:nth-child(2) { animation-delay: 0.1s; }
    .module-card:nth-child(3) { animation-delay: 0.15s; }
    .module-card:nth-child(4) { animation-delay: 0.2s; }
    .module-card:nth-child(5) { animation-delay: 0.25s; }
    .module-card:nth-child(6) { animation-delay: 0.3s; }
    .module-card:nth-child(7) { animation-delay: 0.35s; }
    .module-card:nth-child(8) { animation-delay: 0.4s; }

    /* Gold shimmer on hover */
    .module-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px; border-radius: 0.75rem 0.75rem 0 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .module-card:hover::before { opacity: 1; }
    .module-card { position: relative; overflow: hidden; }

    /* Audiobook banner */
    .audiobook-banner {
      background: linear-gradient(135deg, rgba(240,192,48,0.08), rgba(240,192,48,0.02));
      border: 1px solid rgba(240,192,48,0.2);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex; align-items: center; gap: 1.25rem;
      transition: border-color 0.3s;
    }
    .audiobook-banner:hover { border-color: rgba(240,192,48,0.4); }
    .audiobook-banner-icon {
      width: 48px; height: 48px; flex-shrink: 0;
      background: rgba(240,192,48,0.15); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .audiobook-banner-icon svg { width: 24px; height: 24px; color: var(--gold); }
    .audiobook-banner-text h3 {
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1rem;
      color: var(--white); margin-bottom: 0.25rem;
    }
    .audiobook-banner-text p { color: var(--muted); font-size: 0.85rem; }
    .audio-banner-btn {
      margin-left: auto;
      background: var(--gold); color: var(--black);
      font-weight: 700; font-size: 0.8rem;
      padding: 0.6rem 1.25rem; border-radius: 4px;
      text-decoration: none; white-space: nowrap;
      transition: filter 0.2s;
    }
    .audiobook-banner-btn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>

  <!-- Top Nav -->
  <nav class="topnav" id="topnav"></nav>

  <!-- Main -->
  <main class="main" id="mainContent">
    <div class="loading" id="loader"><div class="spinner"><img src="/logo.png" alt="Loading"></div></div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/topnav.js"></script>
  <script>
    // Module icon SVGs mapped by slug — matching free-course landing page
    var MODULE_ICONS = {
      vision: '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16s5-9 13-9 13 9 13 9-5 9-13 9S3 16 3 16z"/><circle cx="16" cy="16" r="4.5"/><circle cx="16" cy="16" r="2" fill="currentColor" stroke="none"/></svg>',
      'enterprise-code': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="11" height="11" rx="2.5"/><rect x="18" y="3" width="11" height="11" rx="2.5"/><rect x="3" y="18" width="11" height="11" rx="2.5"/><rect x="18" y="18" width="11" height="11" rx="2.5"/></svg>',
      marketing: '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M26 5v22L14 20H8a3 3 0 0 1-3-3v-2a3 3 0 0 1 3-3h6L26 5z"/><path d="M8 20v5a2 2 0 0 0 2 2h2"/></svg>',
      'team-people': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="8" r="4"/><path d="M3 27v-3a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v3"/><circle cx="22" cy="10" r="3.5"/><path d="M24 18a5 5 0 0 1 5 5v4"/></svg>',
      'leadership-system': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="16" r="12"/><polygon points="22 10 14 14 10 22 18 18" fill="currentColor" stroke="none"/></svg>',
      finance: '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="16" y1="4" x2="16" y2="28"/><path d="M22 10H13a4 4 0 0 0 0 8h6a4 4 0 0 1 0 8H10"/></svg>',
      'ai-enterprises': '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="6" width="22" height="16" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><circle cx="16" cy="1.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="14" r="2.5"/><circle cx="20" cy="14" r="2.5"/><rect x="2" y="10" width="3" height="6" rx="1.5"/><rect x="27" y="10" width="3" height="6" rx="1.5"/><line x1="11" y1="22" x2="11" y2="27"/><line x1="21" y1="22" x2="21" y2="27"/></svg>'
    };

    // Default icon color per module
    var MODULE_COLORS = {
      vision: '#818cf8',
      'enterprise-code': '#f59e0b',
      marketing: '#ec4899',
      'team-people': '#22d3ee',
      'leadership-system': '#22c55e',
      finance: '#a78bfa',
      'ai-enterprises': '#f6d43f'
    };

    document.addEventListener('auth:ready', async function(e) {
      const user = e.detail;
      const modules = await initTopnav('library');

      const completed = modules.filter(m => m.completed).length;
      const total = modules.length;
      const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <h1 class="page-title">Welcome back, ${user.firstName}</h1>
        <p class="page-subtitle">Continue your Enterprise Masterclass</p>

        <div class="progress-wrap">
          <div class="progress-header">
            <span class="progress-label">Course Progress</span>
            <span class="progress-count">${completed} of ${total} complete</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
        </div>

        <!-- Audiobook banner -->
        <div class="audiobook-banner">
          <div class="audiobook-banner-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
              <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
            </svg>
          </div>
          <div class="audiobook-banner-text">
            <h3>Audio Version Available</h3>
            <p>Listen to the Enterprise Masterclass on the go</p>
          </div>
          <a href="/audiobook" class="audio-banner-btn">Listen Now</a>
        </div>

        <div class="module-grid">
          ${modules.map((m, i) => {
            var color = m.iconColor || MODULE_COLORS[m.slug] || '#F0C030';
            var icon = MODULE_ICONS[m.slug] || MODULE_ICONS.vision;
            return `
            <a href="/module?slug=${m.slug}" class="module-card card card-hover">
              <div class="module-icon" style="background:${color}15;">
                <span style="color:${color};">${icon}</span>
              </div>
              <div class="module-number">Masterclass ${String(i + 1).padStart(2, '0')}</div>
              <div class="module-title">${m.title}</div>
              <div class="module-desc">${m.description}</div>
              ${m.completed
                ? '<span class="module-status completed">&#10003; Completed</span>'
                : m.hasVideo
                  ? '<span class="module-status start">Start Masterclass &rarr;</span>'
                  : '<span class="module-status coming-soon">Coming Soon</span>'
              }
            </a>
          `;}).join('')}
        </div>
      `;
    });
  </script>
</body>
</html>
