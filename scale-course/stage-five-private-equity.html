    var SLUG = 'stage-five-private-equity';

    document.addEventListener('auth:ready', async function(e) {
      var modules = await initTopnav('library', SLUG);
      if (isModuleLocked(modules, SLUG)) { window.location.href = '/dashboard'; return; }
      var mod = modules.find(function(m) { return m.slug === SLUG; }) || {};

      var main = document.getElementById('mainContent');
      main.innerHTML = '<div class="chapter-layout">' +

        '<div class="chapter-hero">' +
          '<a href="/dashboard" class="back-link">&larr; Back to Dashboard</a>' +
          '<span class="chapter-number">Module 09</span>' +
          '<h1 class="chapter-title">Stage Five &mdash;<br>Private Equity</h1>' +
          '<p class="chapter-subtitle">9 &rarr; 10 Figures &middot; Pure strategy, pure leverage</p>' +
          '<div class="reading-meta"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>6 min read</span></div>' +
        '</div>' +

        '<div class="section">' +
          '<p class="lead">By the time you\'re here, the operating business runs itself. Your job shifts entirely to strategy. Roll-ups. M&amp;A. Franchising. Vertical integration. Acquiring competitors. It becomes a game of deal flow, capitalization, and integration.</p>' +
        '</div>' +

        '<div class="section">' +
          '<div class="insight-card blue">' +
            '<div class="insight-label blue"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> A Note From Me</div>' +
            '<p>I haven\'t personally reached this stage yet. What\'s on this page is drawn from studying the operators who have &mdash; not from firsthand execution. Right now I\'m focused on consolidating activities that lead toward a significant exit of my own. If you want to dig deeper into what this stage actually looks like in practice, one of the best resources I\'ve found is <strong>PitchBook</strong> &mdash; a tool where you can study real valuations, real exits, and what\'s actually selling in any given category. That\'s the honest disclosure.</p>' +
          '</div>' +
        '</div>' +

        '<div class="section">' +
          '<h2>What Stage 5 Actually Looks Like</h2>' +
          '<p>Private Equity is the stage where the operating business runs itself and the operator\'s job shifts entirely to strategy. At this point the game is no longer about building the business. It\'s about using the business you\'ve built as a platform for deploying capital. This is where serial entrepreneurs get to have all of the fun.</p>' +
          '<p>The strategic moves at this stage are roll-ups of smaller operators in your category. Strategic M&amp;A that adds capability or customer base. Franchising the model out to operators who run it under your brand. Vertical integration into suppliers and distributors. Acquiring competitors outright. Done well, any one of these can add more market share in a single deal than a year of organic growth. This is where billionaires are made.</p>' +
        '</div>' +

        '<div class="section">' +
          '<h2>The Three Functions That Matter at This Stage</h2>' +
          '<div class="sequence-category"><div class="sequence-category-label">The Three Functions</div><div class="sequence-item">Deal Flow &mdash; A consistent pipeline of acquisition targets.</div><div class="sequence-item">Capitalization &mdash; Access to debt, equity, and strategic capital on demand.</div><div class="sequence-item">Integration &mdash; A repeatable playbook for absorbing acquired companies without breaking them.</div></div>' +
        '</div>' +

        '<div class="section">' +
          '<h2>Protecting the Wealth That\'s Being Created</h2>' +
          '<p>The wealth being generated at this stage has to be protected. And it has to be handled separately from the operating business. I\'d have my personal wealth, estate, and tax strategy fully built out and running by the time I reached here &mdash; not scrambling to set it up. The structure I\'d be looking at to manage all of that outside the operating company is a Family Office. That\'s the move I\'d make to ensure the wealth compounds in its own right, independent of whatever happens next with the business.</p>' +
        '</div>' +

        '<div class="section">' +
          '<div class="insight-card purple">' +
            '<div class="insight-label purple"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5L12 2z"/></svg> The Endgame Truth</div>' +
            '<p>All roads lead to private equity. The only question is whether you arrive at Stage 5 with a business built to play the PE game &mdash; or with a business that gets bought, broken up, and absorbed by someone else\'s PE game.</p>' +
          '</div>' +
        '</div>' +

        '<div class="section">' +
          '<p>That\'s the full map. Five stages. Fifty-six elements. A clear view of what the endgame actually looks like.</p>' +
        '</div>' +

        '<div class="chapter-actions">' +

        '</a>' +

      '</div>';

      // Scroll reveal
      var sections = document.querySelectorAll('.section');

          try {

          } catch(e) { btn.textContent = 'Mark as Complete'; btn.disabled = false; }
        });
