  <script>
    var SLUG = 'scaling-sequence';

    window.showStage = function(num) {
      document.querySelectorAll('.kanban-tab').forEach(function(tab) { tab.classList.toggle('active', tab.dataset.stage == num); });
      document.querySelectorAll('.stage-content').forEach(function(content) { content.classList.toggle('active', content.id === 'stage-' + num); });
    };

    document.addEventListener('auth:ready', async function(e) {
      var modules = await initTopnav('library', SLUG);
      if (isModuleLocked(modules, SLUG)) { window.location.href = '/dashboard'; return; }
      var mod = modules.find(function(m) { return m.slug === SLUG; }) || {};

      var main = document.getElementById('mainContent');
      main.innerHTML = '<div class="chapter-layout">' +

        '<div class="chapter-hero">' +
          '<a href="/dashboard" class="back-link">&larr; Back to Dashboard</a>' +
          '<span class="chapter-number">Module 04</span>' +
          '<h1 class="chapter-title">The Scaling<br>Sequence</h1>' +
          '<p class="chapter-subtitle">The 56 Checklist Elements, Mapped Across the 5 Stages of the Enterprise Framework</p>' +
          '<div class="reading-meta"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>12 min read</span></div>' +
        '</div>' +

        '<div class="section visible">' +
          '<p class="lead">Now one of the things I noticed in my own failures is that many times I would try and do things in the wrong order. I would spend too much time on things that apply at Stage 3 when I was in Stage 1 &mdash; or vice versa.</p>' +
          '<p>I worked at a company that was on the Inc 5000 and doing upwards of $70 Million. Growth was amazing and strong, but within 6 months they ended up shutting down. I always wondered why, and it was simply because they started doing things in Stage 1 when they needed to go into Stage 5.</p>' +
          '<p>I knew I needed to sequence this checklist across the stages so that I would focus on what\'s most important at the right time. You\'ll notice that as the stages go on, a few new elements show up that didn\'t even make it onto the original checklist &mdash; and they\'ll provide a lot of great context for the earlier stages.</p>' +

          '<div class="insight-card blue">' +
            '<div class="insight-label blue"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> The Sequencing Principle</div>' +
            '<p>The 56 elements aren\'t a buffet. They\'re a sequence. Installing the wrong elements at the wrong stage doesn\'t just slow the business down &mdash; <strong>it actively breaks it.</strong> Stage 1 plays at Stage 3 starve the company. Stage 5 plays at Stage 1 bankrupt it.</p>' +
          '</div>' +

          '<div class="kanban-board">' +
            '<div class="kanban-tab active" data-stage="1" onclick="showStage(1)"><div class="kanban-stage-num">Stage 1</div><div class="kanban-stage-title">Value Creation</div><div class="kanban-revenue">$0 &rarr; 6 Fig</div></div>' +
            '<div class="kanban-tab" data-stage="2" onclick="showStage(2)"><div class="kanban-stage-num">Stage 2</div><div class="kanban-stage-title">Systems</div><div class="kanban-revenue">6 &rarr; 7 Fig</div></div>' +
            '<div class="kanban-tab" data-stage="3" onclick="showStage(3)"><div class="kanban-stage-num">Stage 3</div><div class="kanban-stage-title">Enterprise Leadership</div><div class="kanban-revenue">7 &rarr; 8 Fig</div></div>' +
            '<div class="kanban-tab" data-stage="4" onclick="showStage(4)"><div class="kanban-stage-num">Stage 4</div><div class="kanban-stage-title">Platform</div><div class="kanban-revenue">8 &rarr; 9 Fig</div></div>' +
            '<div class="kanban-tab" data-stage="5" onclick="showStage(5)"><div class="kanban-stage-num">Stage 5</div><div class="kanban-stage-title">Private Equity</div><div class="kanban-revenue">9 &rarr; 10 Fig</div></div>' +
          '</div>' +

          // Stage 1
          '<div class="stage-content active" id="stage-1">' +
            '<div class="stage-content-header"><span class="stage-content-badge" style="background:rgba(129,140,248,0.15);color:#818cf8;">Stage 1</span><div><div class="stage-content-title">Value Creation</div><div class="stage-content-range">$0 &rarr; 6 Figures &mdash; Prove the market wants what you\'re selling.</div></div></div>' +
            '<p>The only job in Stage 1 is proving value in the marketplace. Not systems. Not team. Not brand. Can you make something people will actually pay for, repeatedly? Everything else is a distraction until this is locked.</p>' +
            '<h3>Priorities for This Stage</h3>' +
            '<div class="sequence-category"><div class="sequence-category-label">Vision & Foundation</div><div class="sequence-item">Scaling Strategy & Psychology</div><div class="sequence-item">Ideal Customer Profile (ICP)</div><div class="sequence-item">Category of One</div><div class="sequence-item">Proof & Testimonials</div></div>' +
            '<div class="sequence-category"><div class="sequence-category-label">Offer & Delivery</div><div class="sequence-item">Irresistible Offer</div><div class="sequence-item">Value Ladder/Business Model &mdash; a simple core offer with one upsell/downsell</div><div class="sequence-item">Means to Deliver &mdash; equipment, skills, people, or AI needed to fulfill the offer</div><div class="sequence-item">Payment Processor</div></div>' +
            '<div class="sequence-category"><div class="sequence-category-label">Customer Acquisition &mdash; Pick One Channel</div><div class="sequence-item">Choose one: Digital Funnels, Prospecting, Referrals, or Partners & Affiliates</div><div class="sequence-item">Go deep on that one channel until it consistently produces customers</div><div class="sequence-item">Note: Find the channel where your customers are already hanging out</div></div>' +
            '<div class="sequence-category"><div class="sequence-category-label">Tech Stack (Bare Minimum)</div><div class="sequence-item">Phone Set-Up</div><div class="sequence-item">Speed to Lead &mdash; handled personally by the founder</div><div class="sequence-item">CRM or Database (Excel works &mdash; don\'t spend money here)</div></div>' +
            '<div class="sequence-category"><div class="sequence-category-label">Financials (Bare Minimum)</div><div class="sequence-item">Clean Books & Record Keeping</div></div>' +
            '<div class="insight-card gold"><div class="insight-label gold"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5L12 2z"/></svg> Hold That Thought</div><p>If all of this sounds like a lot to install on your own &mdash; by the end of this playbook I\'m going to show you the <strong>30-day system</strong> I built for exactly this problem.</p></div>' +
            '<div class="stage-nav"><div class="stage-nav-btn" onclick="showStage(2)">Next: Stage 2 &mdash; Systems <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div></div>' +
          '</div>' +

          // Stage 2
          '<div class="stage-content" id="stage-2">' +
            '<div class="stage-content-header"><span class="stage-content-badge" style="background:rgba(245,158,11,0.15);color:#f59e0b;">Stage 2</span><div><div class="stage-content-title">Systems</div><div class="stage-content-range">6 &rarr; 7 Figures &mdash; Turn the thing that works into a machine that runs.</div></div></div>' +
            '<p>System creation and orchestration. You\'ve proven value &mdash; now the business has to stop living inside your head. Documented processes, CRM flows, fulfillment SOPs, financial rigor. This is where we set the stage for the founder to stop being the bottleneck.</p>' +
            '<h3>Priorities for This Stage</h3>' +
            '<div class="sequence-category"><div class="sequence-category-label">Vision & Foundation (Refined)</div><div class="sequence-item">Vision + 3-Year Target</div><div class="sequence-item">Values + Purpose / Mission</div><div class="sequence-item">Proof & Testimonials (continue to collect and systematize)</div><div class="sequence-item">Category of One / Convergent Positioning</div></div>' +
            '<div class="sequence-category"><div class="sequence-category-label">People & Team</div><div class="sequence-item">First Hires (No more than 3) &mdash; the earliest critical seats based on your skills</div></div>' +
            '<div class="sequence-category"><div class="sequence-category-label">Customer Acquisition (Refined & Expanded)</div><div class="sequence-item">Continue to refine, systemize, and expand the channel chosen in Stage 1</div><div class="sequence-item">Lead Magnets</div><div class="sequence-item">Branding + Story + Archetype</div><div class="sequence-item">Solid and Simple Website</div></div>' +
            '<div class="sequence-category"><div class="sequence-category-label">Sales & Delivery (Documented)</div><div class="sequence-item">Speed to Lead</div><div class="sequence-item">Retention/Ascension Workflow &mdash; Email/SMS/Phone Calls</div><div class="sequence-item">Customer Onboarding Plan</div><div class="sequence-item">Documented Sales Script</div><div class="sequence-item">Workflow Maps &mdash; customer acquisition + fulfillment</div><div class="sequence-item">Playbooks &mdash; tied to each workflow</div></div>' +
            '<div class="sequence-category"><div class="sequence-category-label">Financials (Dialed In)</div><div class="sequence-item">P&L (Net Profit 20&ndash;25%)</div><div class="sequence-item">Balance Sheet</div><div class="sequence-item">Cash Flow</div><div class="sequence-item">Unit Economics Dialed In &mdash; optimize for profitability</div></div>' +
            '<div class="insight-card orange"><div class="insight-label orange"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg> A Quick Note</div><p><strong>Stage 2 is where most operators get stuck</strong> &mdash; and where the jump to Stage 3 separates the businesses that stall at seven figures from the ones that actually reach Enterprise Leadership.</p></div>' +
            '<div class="stage-nav"><div class="stage-nav-btn" onclick="showStage(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Previous: Stage 1</div><div class="stage-nav-btn" onclick="showStage(3)">Next: Stage 3 &mdash; Enterprise Leadership <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div></div>' +
          '</div>' +

          // Stage 3
          '<div class="stage-content" id="stage-3">' +
            '<div class="stage-content-header"><span class="stage-content-badge" style="background:rgba(34,197,94,0.15);color:#22c55e;">Stage 3</span><div><div class="stage-content-title">Enterprise Leadership</div><div class="stage-content-range">7 &rarr; 8 Figures &mdash; The stage this whole playbook was built for.</div></div></div>' +
            '<p>Every one of the 56 checklist elements is installed and running. The Rule of Three is in seat, the Leadership System is operating, and the cash is flowing enough to fund the next move. This is where a business becomes an enterprise and where a founder becomes an owner and true Enterprise Entrepreneur.</p>' +
            '<h3>What This Stage Looks Like</h3>' +
            '<p>The checklist was built for this stage. There are no new elements to add here; there\'s only the discipline of making sure the full checklist is actually in place, not just listed.</p>' +
            '<p>What I look at, at this stage, are three specific litmus tests. These are the numbers that tell me whether the business is truly operating at Enterprise Leadership or just pretending to.</p>' +
            '<h3>Litmus Test #1 &mdash; Revenue Per Employee (RPE) of $250K+</h3>' +
            '<p>$250K per employee is the baseline marker of a healthy scaling business. Note: with AI now embedded across every function, this number will keep climbing. $300K, $400K, and beyond is quickly becoming the benchmark.</p>' +
            '<div class="litmus-grid"><div class="litmus-card"><div class="litmus-value">$250K+</div><div class="litmus-label">Revenue Per Employee</div></div><div class="litmus-card"><div class="litmus-value">20&ndash;25%</div><div class="litmus-label">Net Margins</div></div><div class="litmus-card"><div class="litmus-value">Optional</div><div class="litmus-label">Founder\'s Presence</div></div></div>' +
            '<h3>Litmus Test #2 &mdash; Net Margins of 20&ndash;25%</h3>' +
            '<p>If net margins aren\'t hitting 20&ndash;25%, I treat that as a signal to go back to the drawing board &mdash; not to hustle harder. I look at the offer, the value, whether we\'re targeting the right customers, team efficiency and labor cost per unit.</p>' +
            '<h3>Litmus Test #3 &mdash; Founder\'s Time</h3>' +
            '<p>At this stage, my number one goal is to have the ability to not be in the business anymore. Not necessarily to leave, but to have the choice. I need to be able to step away for 30 days, six months, a full year, and watch the business keep running and keep growing without me.</p>' +
            '<div class="insight-card green"><div class="insight-label green"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> A Fun Possibility</div><p>When the checklist is fully installed and the three litmus tests are green, the business becomes truly sellable. A stand-alone sale at 5&ndash;8&times; EBITDA becomes realistic. A few million in EBITDA at a 5&ndash;8&times; multiple is a <strong>real 8-figure exit</strong> this whole playbook makes possible.</p></div>' +
            '<p>Now &mdash; I know what you\'re thinking. Installing 56 elements, hitting all three litmus tests, building the leadership system &mdash; it sounds like a 5-year grind at best. That\'s exactly why I built something specifically to compress this into 30 days.</p>' +
            '<div class="stage-nav"><div class="stage-nav-btn" onclick="showStage(2)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Previous: Stage 2</div><div class="stage-nav-btn" onclick="showStage(4)">Next: Stage 4 &mdash; Platform <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div></div>' +
          '</div>' +

          // Stage 4
          '<div class="stage-content" id="stage-4">' +
            '<div class="stage-content-header"><span class="stage-content-badge" style="background:rgba(34,211,238,0.15);color:#22d3ee;">Stage 4</span><div><div class="stage-content-title">Platform</div><div class="stage-content-range">8 &rarr; 9 Figures &mdash; Every major function, in-house.</div></div></div>' +
            '<p>You keep everything from the checklist, add middle management beneath the leadership team, and dominate all customer acquisition channels in parallel. Every major business function &mdash; marketing, leadership, finance, tech, operations, people, sales strategy, and legal &mdash; gets brought in-house.</p>' +
            '<h3>What This Stage Looks Like</h3>' +
            '<p>Platform is where the business stops being something you run and becomes something that runs itself. Everything on the checklist stays in place, gets optimized, and it all compounds.</p>' +
            '<p>Up until this point, most operators have been holding on to the marketing, or at the very least the delivery. Everything else &mdash; finance, legal, HR, tech &mdash; often gets outsourced. That\'s the right move early. It\'s the wrong move at this stage.</p>' +
            '<p>The Platform stage is where you bring all of it under one roof. You stop hiring the marketing agency and build a marketing team. You stop renting the CPA firm and hire a real CFO. You stop outsourcing HR and build a real people operation.</p>' +
            '<div class="sequence-category"><div class="sequence-category-label">The Functions I Bring In-House</div><div class="sequence-item">Marketing</div><div class="sequence-item">Leadership</div><div class="sequence-item">Finance</div><div class="sequence-item">Tech</div><div class="sequence-item">Operations</div><div class="sequence-item">People</div><div class="sequence-item">Sales Strategy</div><div class="sequence-item">Legal</div></div>' +
            '<div class="insight-card gold"><div class="insight-label gold"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5L12 2z"/></svg> The Linchpin</div><p>Reaching Platform status is the linchpin to billionaire-style success and being an owner of real capital. It\'s also the stage where the moves in Stage 5 become available.</p></div>' +
            '<div class="stage-nav"><div class="stage-nav-btn" onclick="showStage(3)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Previous: Stage 3</div><div class="stage-nav-btn" onclick="showStage(5)">Next: Stage 5 &mdash; Private Equity <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div></div>' +
          '</div>' +

          // Stage 5
          '<div class="stage-content" id="stage-5">' +
            '<div class="stage-content-header"><span class="stage-content-badge" style="background:rgba(167,139,250,0.15);color:#a78bfa;">Stage 5</span><div><div class="stage-content-title">Private Equity</div><div class="stage-content-range">9 &rarr; 10 Figures &mdash; Pure strategy, pure leverage.</div></div></div>' +
            '<p>By the time you\'re here, the operating business runs itself. Your job shifts entirely to strategy &mdash; roll-ups, M&A, franchising, vertical integration, and acquiring competitors.</p>' +
            '<div class="insight-card blue" style="margin-bottom:1.5rem;"><div class="insight-label blue"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> A Note From Me</div><p>I definitely haven\'t personally reached this stage yet. What\'s on this page is drawn from studying the operators who have &mdash; not from firsthand execution. If you want to dig deeper, one of the best resources I\'ve found is <strong>PitchBook</strong>.</p></div>' +
            '<p>Private Equity is the stage where the operating business runs itself and the operator\'s job shifts entirely to strategy. The strategic moves at this stage are roll-ups, M&A, franchising, vertical integration, and acquiring competitors.</p>' +
            '<div class="sequence-category"><div class="sequence-category-label">The Three Functions That Matter</div><div class="sequence-item">Deal Flow &mdash; a consistent pipeline of acquisition targets</div><div class="sequence-item">Capitalization &mdash; access to debt, equity, and strategic capital on demand</div><div class="sequence-item">Integration &mdash; a repeatable playbook for absorbing acquired companies</div></div>' +
            '<h3>Protecting the Wealth That\'s Being Created</h3>' +
            '<p>The wealth being generated at this stage has to be protected and handled separately from the operating business. The structure I\'d be looking at is a <strong>Family Office</strong> &mdash; to ensure the wealth compounds in its own right, independent of whatever happens next with the business.</p>' +
            '<div class="stage-nav"><div class="stage-nav-btn" onclick="showStage(4)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Previous: Stage 4</div></div>' +
          '</div>' +

        '</div>' +

        '<div class="section">' +
          '<h2>That\'s the Full Map</h2>' +
          '<p>Five stages, 56 elements, and a clear view of what the endgame actually looks like. On the next page, I\'m going to show you what\'s actually possible when you install this.</p>' +
          '<div class="pull-quote"><div class="pull-quote-text">The framework makes the wins repeatable &mdash; and the sequence ensures you\'re building the right things at the right time.</div></div>' +
          '<div class="cta-card"><h3>Don\'t Want to Spend 5 Years Doing This Alone?</h3><p>Enterprise 360 compresses this entire sequence into 30 days. We install the elements. You get your time back.</p><a href="#" class="btn-gold" id="ctaBtn">Book Your Enterprise Call &rarr;</a></div>' +
        '</div>' +

        '<div class="chapter-actions">' +
          '<button class="btn-gold chapter-complete-btn" id="completeBtn">' + (mod.completed ? '&#10003; Completed' : 'Mark as Complete') + '</button>' +
        '</div>' +

        '<a href="/real-results" class="next-chapter">' +
          '<div class="next-chapter-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>' +
          '<div><div class="next-chapter-label">Next Module</div><div class="next-chapter-title">Real Results</div></div>' +
        '</a>' +

      '</div>';

      // CTA -> Coming Soon
      document.getElementById('ctaBtn').addEventListener('click', function(e) { e.preventDefault(); openComingSoonModal(); });

      // Scroll reveal
      var sections = document.querySelectorAll('.section');
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) { if (entry.isIntersecting) entry.target.classList.add('visible'); });
      }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
      sections.forEach(function(s) { observer.observe(s); });

      // Mark complete
      var btn = document.getElementById('completeBtn');
      if (mod.completed) { btn.style.background = 'var(--success)'; btn.style.cursor = 'default'; }
      else {
        btn.addEventListener('click', async function() {
          btn.disabled = true; btn.textContent = 'Saving...';
          try {
            var res = await fetch('/api/modules/' + SLUG + '/complete', { method: 'POST', credentials: 'same-origin' });
            if (res.ok) { btn.innerHTML = '&#10003; Completed'; btn.style.background = 'var(--success)'; btn.style.cursor = 'default'; var mcLink = document.querySelector('.mc-link.active'); if (mcLink) mcLink.classList.add('completed'); }
          } catch(e) { btn.textContent = 'Mark as Complete'; btn.disabled = false; }
        });
      }
    });
  </script>
</body>
</html>
