  <title>The Scaling Sequence — Scale Enterprises</title>

  <link rel="stylesheet" href="/css/chapter.css">
  <style>
    .stage-cards { display: grid; grid-template-columns: 1fr; gap: 1rem; margin: 2rem 0; }
    .stage-card { display: flex; align-items: center; gap: 1.25rem; padding: 1.25rem 1.5rem; background: var(--surface); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; text-decoration: none; transition: all 0.25s; cursor: pointer; }
    .stage-card:hover { background: var(--surface-light); border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
    .stage-card-badge { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.15em; padding: 0.4rem 0.85rem; border-radius: 9999px; flex-shrink: 0; }
    .stage-card-body { flex: 1; }
    .stage-card-title { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1rem; color: var(--white); margin-bottom: 0.25rem; }
    .stage-card-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
    .stage-card-arrow { color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
    .stage-card:hover .stage-card-arrow { transform: translateX(4px); color: var(--white); }
    @media (max-width: 768px) {
      .stage-card { padding: 1rem; gap: 1rem; }
    }
  </style>
</head>
<body>

  <nav class="topnav" id="topnav"></nav>

  <main class="main" id="mainContent">
    <div class="loading" id="loader"><div class="spinner"><img src="/logo.png" alt="Loading"></div></div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/topnav.js"></script>
  <script>
    var SLUG = 'scaling-sequence';

    document.addEventListener('auth:ready', async function(e) {
      var modules = await initTopnav('library', SLUG);
      if (isModuleLocked(modules, SLUG)) { window.location.href = '/dashboard'; return; }
      var mod = modules.find(function(m) { return m.slug === SLUG; }) || {};

      var main = document.getElementById('mainContent');
      main.innerHTML = '<div class="chapter-layout">' +

        '<div class="chapter-hero">' +
          '<a href="/dashboard" class="back-link">&larr; Back to Dashboard</a>' +
          '<span class="chapter-number">Module 04</span>' +
          '<h1 class="chapter-title">The Scaling<br>Sequence</h1>' +
          '<p class="chapter-subtitle">Why Doing the Right Things in the Wrong Order Kills Businesses</p>' +
          '<div class="reading-meta"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>5 min read</span></div>' +
        '</div>' +

        '<div class="section visible">' +
          '<p class="lead">I worked at a company on the Inc. 5000 doing upwards of $70 million in annual revenue. Growth was amazing. Strong. Then, within six months, they shut down.</p>' +
          '<p>For a long time I wondered why. Eventually I figured it out. <strong>They were running Stage 1 plays when the business was sitting in Stage 5.</strong> Founder mentality. Founder-led sales. Founder bottlenecks on every decision. At $70 million, that doesn\'t just stall the company. It burns it down.</p>' +
          '<p>One of the patterns I noticed in my own failures &mdash; and in the failures around me &mdash; was that I was always doing the right things in the wrong order. I\'d spend too much time on Stage 3 elements when I was sitting in Stage 1. Or I\'d ignore foundational elements at Stage 1 because I was busy chasing Stage 4 plays I had no business running yet.</p>' +
          '<p>So I went back through the checklist, and I sequenced it across the five stages. What needs to be installed first. What gets refined next. What waits. You\'ll notice that as the stages unfold, a few new elements show up that didn\'t even make the original 56 &mdash; they don\'t apply until you\'re far enough along to need them.</p>' +

          '<div class="insight-card blue">' +
            '<div class="insight-label blue"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> The Sequencing Principle</div>' +
            '<p>The 56 elements aren\'t a buffet. They\'re a sequence. Installing the wrong elements at the wrong stage doesn\'t just slow the business down &mdash; <strong>it actively breaks it.</strong> Stage 1 plays at Stage 3 starve the company. Stage 5 plays at Stage 1 bankrupt it.</p>' +
          '</div>' +
        '</div>' +

        '<div class="section">' +
          '<h2>The Five Stages</h2>' +
          '<p>The next five modules walk through each stage one by one &mdash; what it looks like, what gets installed, what gets refined, what waits, and what you ignore on purpose. Here\'s the map.</p>' +

          '<div class="stage-cards">' +
            '<a href="/stage-one-value-creation" class="stage-card"><span class="stage-card-badge" style="background:rgba(129,140,248,0.15);color:#818cf8;">Stage 1</span><div class="stage-card-body"><div class="stage-card-title">Value Creation</div><div class="stage-card-desc">$0 &rarr; 6 Figures &mdash; Prove the market wants what you\'re selling. One offer, one channel, one goal: revenue.</div></div><svg class="stage-card-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></a>' +
            '<a href="/stage-two-systems" class="stage-card"><span class="stage-card-badge" style="background:rgba(245,158,11,0.15);color:#f59e0b;">Stage 2</span><div class="stage-card-body"><div class="stage-card-title">Systems</div><div class="stage-card-desc">6 &rarr; 7 Figures &mdash; Turn what works into a machine that runs. Documented processes, first hires, financial rigor.</div></div><svg class="stage-card-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></a>' +
            '<a href="/stage-three-enterprise-leadership" class="stage-card"><span class="stage-card-badge" style="background:rgba(34,197,94,0.15);color:#22c55e;">Stage 3</span><div class="stage-card-body"><div class="stage-card-title">Enterprise Leadership</div><div class="stage-card-desc">7 &rarr; 8 Figures &mdash; Every checklist element installed. Three litmus tests. The stage this whole playbook was built for.</div></div><svg class="stage-card-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></a>' +
            '<a href="/stage-four-platform" class="stage-card"><span class="stage-card-badge" style="background:rgba(34,211,238,0.15);color:#22d3ee;">Stage 4</span><div class="stage-card-body"><div class="stage-card-title">Platform</div><div class="stage-card-desc">8 &rarr; 9 Figures &mdash; Every major function in-house. Middle management. All channels running in parallel.</div></div><svg class="stage-card-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></a>' +
            '<a href="/stage-five-private-equity" class="stage-card"><span class="stage-card-badge" style="background:rgba(167,139,250,0.15);color:#a78bfa;">Stage 5</span><div class="stage-card-body"><div class="stage-card-title">Private Equity</div><div class="stage-card-desc">9 &rarr; 10 Figures &mdash; Pure strategy. Roll-ups, M&A, vertical integration, and the endgame.</div></div><svg class="stage-card-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></a>' +
          '</div>' +
        '</div>' +

        '<div class="section">' +
          '<div class="cta-card"><h3>Don\'t Want to Spend 5 Years Doing This Alone?</h3><p>Enterprise 360 compresses this entire sequence into 30 days. We install the elements. You get your time back.</p><a href="#" class="btn-gold" id="ctaBtn">Book Your Enterprise Call &rarr;</a></div>' +
        '</div>' +

        '<div class="chapter-actions">' +
          '<button class="btn-gold chapter-complete-btn" id="completeBtn">' + (mod.completed ? '&#10003; Completed' : 'Mark as Complete') + '</button>' +
        '</div>' +

        '<a href="/stage-one-value-creation" class="next-chapter">' +
          '<div class="next-chapter-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>' +
          '<div><div class="next-chapter-label">Next Module</div><div class="next-chapter-title">Stage One &mdash; Value Creation</div></div>' +
        '</a>' +

      '</div>';

      // CTA -> Coming Soon
      document.getElementById('ctaBtn').addEventListener('click', function(e) { e.preventDefault(); openComingSoonModal(); });

      // Scroll reveal
      var sections = document.querySelectorAll('.section');
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) { if (entry.isIntersecting) entry.target.classList.add('visible'); });
      }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
      sections.forEach(function(s) { observer.observe(s); });

      // Mark complete
      var btn = document.getElementById('completeBtn');
      if (mod.completed) { btn.style.background = 'var(--success)'; btn.style.cursor = 'default'; }
      else {
        btn.addEventListener('click', async function() {
          btn.disabled = true; btn.textContent = 'Saving...';
          try {
            var res = await fetch('/api/modules/' + SLUG + '/complete', { method: 'POST', credentials: 'same-origin' });
            if (res.ok) { btn.innerHTML = '&#10003; Completed'; btn.style.background = 'var(--success)'; btn.style.cursor = 'default'; var mcLink = document.querySelector('.mc-link.active'); if (mcLink) mcLink.classList.add('completed'); }
          } catch(e) { btn.textContent = 'Mark as Complete'; btn.disabled = false; }
        });
      }
    });
  </script>
</body>
</html>
