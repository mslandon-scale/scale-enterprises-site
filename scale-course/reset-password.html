<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wc7ebmnu6p");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>Set New Password — Scale Enterprises</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand"><img src="/logo.png" alt="Scale Enterprises"><span>Scale Enterprises</span></div>
      <h1 class="auth-heading">Set New Password</h1>
      <p class="auth-sub">Enter your new password below.</p>

      <div class="auth-error" id="errorBox"></div>

      <div class="auth-success" id="successBox"></div>

      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <input class="form-input" type="password" id="password" placeholder="At least 8 characters" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input class="form-input" type="password" id="confirmPassword" placeholder="Re-enter your password" required>
        </div>
        <button type="submit" class="btn-gold" id="submitBtn">Reset Password</button>
      </form>

      <p class="auth-footer">
        <a href="/">Back to Sign In</a>
      </p>
    </div>
  </div>

  <script>
    // Extract token from URL
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');

    if (!token) {
      document.getElementById('errorBox').textContent = 'Invalid reset link. Please request a new one.';
      document.getElementById('errorBox').classList.add('show');
      document.getElementById('resetForm').style.display = 'none';
    }

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('submitBtn');
      var errorBox = document.getElementById('errorBox');
      var successBox = document.getElementById('successBox');
      errorBox.classList.remove('show');
      successBox.classList.remove('show');

      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        errorBox.textContent = 'Passwords do not match';
        errorBox.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        var res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, password: password })
        });

        var data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.error || 'Something went wrong';
          errorBox.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
          return;
        }

        successBox.textContent = 'Password reset successfully! Redirecting to sign in...';
        successBox.classList.add('show');
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(function() { window.location.href = '/'; }, 2500);
      } catch {
        errorBox.textContent = 'Something went wrong. Please try again.';
        errorBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
