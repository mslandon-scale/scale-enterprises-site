  <script>
    var SLUG = 'how-it-started';

    document.addEventListener('auth:ready', async function(e) {
      var modules = await initTopnav('library', SLUG);
      var mod = modules.find(function(m) { return m.slug === SLUG; }) || {};

      var main = document.getElementById('mainContent');
      main.innerHTML = '<div class="chapter-layout">' +

        '<div class="chapter-hero">' +
          '<a href="/dashboard" class="back-link">&larr; Back to Dashboard</a>' +
          '<span class="chapter-number">Module 01</span>' +
          '<h1 class="chapter-title">How It Started</h1>' +
          '<p class="chapter-subtitle">Scraped Knees, Scar Tissue, and the Notes I Wish I\'d Had</p>' +
          '<div class="reading-meta">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
            '<span>10 min read</span>' +
          '</div>' +
        '</div>' +

        '<div class="section">' +
          '<div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem;">' +
            '<img src="/matthew-landon.jpeg" alt="Matthew Landon" style="width:160px;height:160px;border-radius:50%;object-fit:cover;border:4px solid var(--gold);flex-shrink:0;box-shadow:0 8px 32px rgba(240,192,48,0.2);">' +
            '<div>' +
              '<div style="font-family:Sora,sans-serif;font-weight:700;font-size:1.4rem;color:var(--white);margin-bottom:0.35rem;">Matthew Landon</div>' +
              '<div style="font-size:0.95rem;color:var(--muted);">Founder, Scale Enterprises</div>' +
            '</div>' +
          '</div>' +
          '<p class="lead">My name is Matthew Landon, and I\'ve been building businesses for a long time. Ever since I was a kid. One of my first was as a third grader, buying toolbox kits and selling the finished product. Since then it\'s been landscaping, agencies, real estate, e-commerce, health and wellness, and consulting.</p>' +
          '<p>Every time I stepped onto the field of entrepreneurship, the goal was the same. Not a job for myself with extra steps. Not a lifestyle business. A real enterprise. The kind that changes something in the world and gives me <span class="highlight">wealth, freedom, and control.</span> A bigger game.</p>' +
          '<p>It has cost me. A lot.</p>' +
        '</div>' +

        '<div class="section">' +
          '<h2>The Swings That Missed</h2>' +
          '<p>I\'ve taken swings in real estate and blown it. I\'ve built agencies and blown it. I\'ve launched coaching and watched it fizzle out. I\'ve had ventures crash and burn in ways that still sting. I\'ve scraped both knees raw and then gotten up and scraped them again, because every time something collapsed, I was certain the next one would be different.</p>' +
          '<p>Most of the time it wasn\'t. And the worst part wasn\'t the money or the time. It was the quiet realization afterward, every single time, that <strong>I hadn\'t actually known what I was missing. I didn\'t know why it didn\'t work. I didn\'t even know why some did work.</strong></p>' +
        '</div>' +

        '<div class="section">' +
          '<div class="stat-row">' +
            '<div class="stat-block"><div class="stat-value">40</div><div class="stat-label">Leads / Week (Before)</div></div>' +
            '<div class="stat-block"><div class="stat-value">120</div><div class="stat-label">Leads / Week (After)</div></div>' +
            '<div class="stat-block"><div class="stat-value">7</div><div class="stat-label">Days to 3x</div></div>' +
          '</div>' +
          '<p>At one point I tripled an organization\'s lead flow in seven days. From 40 to 120 qualified leads a week. It worked beautifully. But even as I was doing it, I only grasped <em>some</em> of why the pieces connected. I couldn\'t repeat it on demand. I couldn\'t explain it cleanly to anyone else.</p>' +
          '<p>A win I couldn\'t replicate was still, in the long run, a loss waiting to happen.</p>' +
          '<p>I knew I had to figure it out. And the reason I knew, more than any failed venture of my own, was something I\'d been watching my whole life.</p>' +
        '</div>' +

        '<div class="section">' +
          '<h2>The Man Who Taught Me What Stuck Looked Like</h2>' +
          '<p>Twenty years ago, my dad started a service business.</p>' +
          '<p>He\'s a good man. He works hard. He does noble work, and he\'s been doing it ever since. My parents provided for our family on the back of that business, and I will spend the rest of my life grateful for what they built and what they gave us.</p>' +
          '<p>But somewhere in the first few years, the business hit a plateau. And it never moved off that plateau. Not in five years. Not in ten. <strong>Not in twenty.</strong></p>' +
          '<p>He\'s still wearing every hat. He\'s still the salesperson, the operator, the technician, the bookkeeper, and the customer service department all in one body. There\'s no real pipeline. There\'s no real brand. There\'s no team that can run anything without him. If I had to put a number on it, every single element I\'m about to walk you through in this playbook is operating at maybe 10% of what it should be in his business. Some of them aren\'t there at all.</p>' +
          '<p>And the result is exactly what you\'d expect. He gets to provide, but he never gets to play a bigger game. He never gets the breakthrough. He never gets to upgrade. Not the business, not the role, not himself. <strong>The business doesn\'t serve him. It owns him.</strong> Flat out.</p>' +
          '<div class="insight-card gold">' +
            '<div class="insight-label gold"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> Important</div>' +
            '<p>This isn\'t a story about a bad operator or a man who didn\'t try. He\'s tried his entire life. He\'s a better man than I\'ll ever be. The point isn\'t that he failed. The point is that <strong>he was missing the same things I kept missing.</strong> Nobody ever handed him the map. Nobody ever showed him the elements. Nobody ever told him what stage of the game he was in or what was supposed to come next.</p>' +
          '</div>' +
        '</div>' +

        '<div class="section">' +
          '<h2>What Watching Cost Me &mdash; and What It Saved Me</h2>' +
          '<p>That image of my dad, twenty years in, still wearing every hat, still trapped inside the thing he built, became the single sharpest filter I have for my own life.</p>' +
          '<p>Every time I\'m about to make a decision in a business, I run it against that filter. Will this hand me my time back, or will this take more of it? Will this build an asset, or will this just build me a more expensive job? Will this turn me into an owner, or will this turn me into my dad\'s plateau twenty years from now?</p>' +
          '<p>I can\'t run that filter without compassion. I love him, and I respect what he built. But I cannot run it without honesty either. Because the alternative &mdash; being kind to myself about it and ending up exactly where he ended up &mdash; is the worst possible outcome I can imagine.</p>' +
        '</div>' +

        '<div class="section">' +
          '<div class="pull-quote">' +
            '<div class="pull-quote-text">So I stopped guessing. I studied, obsessively. I knew that if I was going to succeed, I couldn\'t keep throwing spaghetti at a wall and hoping it stuck. I read hundreds of books. I spent real money to get in the right rooms. I learned from the people who had actually done it, not the people who talked about it. I reverse-engineered every company I admired down to the core.</div>' +
          '</div>' +
        '</div>' +

        '<div class="section">' +
          '<h2>A Pattern That Refused to Break</h2>' +
          '<p>A pattern emerged that I could not un-see.</p>' +
          '<div class="insight-card blue">' +
            '<div class="insight-label blue">' +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>' +
              ' The Pattern' +
            '</div>' +
            '<p>The ventures that won had <strong>these exact elements locked in.</strong> The ones that failed had almost none. Not some. <strong>Almost none.</strong> Once I saw the pattern, I couldn\'t sleep for days because I knew I had discovered something that would change me and my family\'s life. And that, if I\'d been able to hand it to my dad twenty years ago, might have changed his.</p>' +
          '</div>' +
        '</div>' +

        '<div class="section">' +
          '<h2>What I\'m Actually After</h2>' +
          '<p>This playbook is not a prescription. It\'s not me telling you what you should do. It\'s my notes. The tool I built for myself, out of every win and every loss, and the way I\'m building companies now. If I looked at a business and saw these elements installed, I\'d put serious time and money into it, because I know firsthand the odds of that business succeeding go up dramatically.</p>' +
          '<p>I have compiled <strong>56 things</strong> I believe are paramount for any business, especially service businesses, I own to be successful.</p>' +
          '<p>But before I hand you the tactics and the checklist, I want you to know what I\'m actually playing for, because the game changes when the stakes are clear. I\'m not trying to build a business. I\'ve done that. Anyone can do that, and most of the people I know who did it ended up exactly where my dad ended up. What I\'m after is bigger than a business:</p>' +
          '<p><strong>Wealth</strong> that compounds across generations instead of leaks across decades. <strong>Freedom</strong> to walk away from any room I\'m in without it falling apart. <strong>Legacy</strong> my kids inherit instead of a job they get drafted into. Real <strong>impact</strong> on the lives and businesses I touch. And above all, the kind of <strong>control</strong> where I run my life on my terms instead of my life running me.</p>' +
          '<p><span class="highlight">Wealth. Freedom. Legacy. Impact. Control.</span> That\'s what this playbook is built to produce. Anything less is a more elaborate version of the trap.</p>' +
          '<p>This playbook has given me the power to take control of my businesses so they can reach their full potential. <strong>I\'m confident it can do the same for you.</strong></p>' +
        '</div>' +

        '<div class="section">' +
          '<h2>A Note Before You Begin</h2>' +
          '<p>My dad is still in his business.</p>' +
          '<p>I\'ve put this playbook in front of him. I\'ve offered to help. I\'ve shown him the framework, the checklist, the sequence. Everything you\'re about to read. He\'s read parts of it. He nods. He agrees. And then nothing changes.</p>' +
          '<p>He\'s still wearing every hat. He\'s still the bottleneck. He\'s still on the same plateau he was on when I was in middle school.</p>' +
          '<p>I\'m not saying that to disrespect him. I\'m saying it because I want you to understand something that took me a long time to understand myself. <strong>The map is not the territory.</strong> Knowing what to install isn\'t the same as installing it. Reading this playbook will not change your business. <em>Doing</em> the work in this playbook will.</p>' +
          '<div class="insight-card purple">' +
            '<div class="insight-label purple"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5L12 2z"/></svg> The Choice</div>' +
            '<p>You can read this, nod, agree, and stay where you are. Or you can install it. One of those paths leads where my dad has been stuck for twenty years. The other one leads somewhere else entirely. <strong>I built this playbook for the second path.</strong></p>' +
          '</div>' +
        '</div>' +

        '<div class="section">' +
          '<h2>How to Read This Book</h2>' +
          '<p>You can read this playbook two ways.</p>' +
          '<p>The first is cover to cover, once. Part One gives you the map &mdash; the five-stage framework, the 56-element checklist, and the sequence. Part Two walks you through each of the five stages so you know exactly what to install, and when. If you read in order, everything compounds.</p>' +
          '<p>The second way is as a reference while you do the work. Every chapter is built around a specific piece of the framework, and each one stands on its own when you need to come back to it.</p>' +
          '<p>Either way, the question I want you to sit with is this: <strong>are you running a business, or is the business running you?</strong> If the answer is the second one, you\'re in the right place. Let\'s go to work.</p>' +
        '</div>' +

        '<div class="chapter-actions">' +
          '<button class="btn-gold chapter-complete-btn" id="completeBtn">' + (mod.completed ? '&#10003; Completed' : 'Mark as Complete') + '</button>' +
        '</div>' +

        '<a href="/enterprise-framework" class="next-chapter">' +
          '<div class="next-chapter-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>' +
          '<div><div class="next-chapter-label">Next Module</div><div class="next-chapter-title">The Enterprise Framework</div></div>' +
        '</a>' +

      '</div>';

      // Scroll reveal
      var sections = document.querySelectorAll('.section');
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) { if (entry.isIntersecting) entry.target.classList.add('visible'); });
      }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });
      sections.forEach(function(s) { observer.observe(s); });

      // Mark complete
      var btn = document.getElementById('completeBtn');
      if (mod.completed) {
        btn.style.background = 'var(--success)';
        btn.style.cursor = 'default';
      } else {
        btn.addEventListener('click', async function() {
          btn.disabled = true;
          btn.textContent = 'Saving...';
          try {
            var res = await fetch('/api/modules/' + SLUG + '/complete', { method: 'POST', credentials: 'same-origin' });
            if (res.ok) {
              btn.innerHTML = '&#10003; Completed';
              btn.style.background = 'var(--success)';
              btn.style.cursor = 'default';
              var mcLink = document.querySelector('.mc-link.active');
              if (mcLink) mcLink.classList.add('completed');
            }
          } catch(e) {
            btn.textContent = 'Mark as Complete';
            btn.disabled = false;
          }
        });
      }
    });
  </script>
