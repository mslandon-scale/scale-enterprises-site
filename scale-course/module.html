<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wc7ebmnu6p");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>Module — Scale Enterprises</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    /* Video + Form row */
    .module-row {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 1.5rem;
      margin-bottom: 2rem;
      align-items: start;
    }
    .module-video-col { min-width: 0; }
    .module-form-col { min-width: 0; }

    .buildout-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.75rem;
      padding: 1.5rem;
      position: sticky;
      top: calc(var(--topnav-height, 90px) + 1rem);
    }
    .buildout-icon {
      width: 44px; height: 44px;
      background: rgba(240,192,48,0.12); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
    }
    .buildout-icon svg { width: 22px; height: 22px; color: var(--gold); }
    .buildout-title {
      font-family: 'Sora', sans-serif; font-weight: 700;
      font-size: 1.1rem; color: var(--white);
      margin-bottom: 0.35rem;
    }
    .buildout-sub {
      color: var(--muted); font-size: 0.85rem;
      line-height: 1.5; margin-bottom: 1.25rem;
    }
    .buildout-success {
      display: none;
      text-align: center; padding: 1.5rem 0;
    }
    .buildout-success.show { display: block; }
    .buildout-success p {
      color: var(--success); font-weight: 600; font-size: 0.9rem;
    }

    @media (max-width: 900px) {
      .module-row {
        grid-template-columns: 1fr;
      }
      .buildout-card { position: static; }
    }

    /* Resources section */
    .resources-section { max-width: 48rem; margin-top: 2.5rem; }
    .resources-section h2 {
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1.15rem;
      color: var(--white); margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .resources-section h2 svg { width: 20px; height: 20px; color: var(--gold); }

    .resource-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.5rem;
      margin-bottom: 0.75rem;
      text-decoration: none; color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .resource-item:hover {
      border-color: rgba(240,192,48,0.3);
      transform: translateX(4px);
    }
    .resource-icon {
      width: 40px; height: 40px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .resource-icon svg { width: 20px; height: 20px; }
    .resource-icon.pdf { background: rgba(239,68,68,0.15); color: #ef4444; }
    .resource-icon.prompt { background: rgba(168,85,247,0.15); color: #a855f7; }
    .resource-icon.link { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .resource-info { flex: 1; }
    .resource-title { font-weight: 600; font-size: 0.9rem; color: var(--white); }
    .resource-type { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .resource-arrow { color: var(--muted); transition: color 0.2s; }
    .resource-item:hover .resource-arrow { color: var(--gold); }

    .prompt-content {
      background: rgba(168,85,247,0.08);
      border: 1px solid rgba(168,85,247,0.15);
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .prompt-content .resource-title { margin-bottom: 0.5rem; }
    .prompt-text {
      font-size: 0.85rem; color: var(--white-soft);
      line-height: 1.7; white-space: pre-wrap;
    }
    .copy-btn {
      margin-top: 0.5rem;
      background: rgba(168,85,247,0.2); color: #a855f7;
      border: none; border-radius: 4px; padding: 0.4rem 0.8rem;
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: rgba(168,85,247,0.3); }

    .no-resources { color: var(--muted); font-size: 0.85rem; padding: 1rem 0; }
  </style>
</head>
<body>

  <nav class="topnav" id="topnav"></nav>

  <main class="main" id="mainContent">
    <div class="loading" id="loader"><div class="spinner"><img src="/logo.png" alt="Loading"></div></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/topnav.js"></script>
  <script>
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(function() { t.classList.remove('show'); }, 3000);
    }

    function timeAgo(dateStr) {
      var diff = Date.now() - new Date(dateStr).getTime();
      var mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      var hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      var days = Math.floor(hrs / 24);
      if (days < 30) return days + 'd ago';
      return new Date(dateStr).toLocaleDateString();
    }

    document.addEventListener('auth:ready', async function(e) {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (!slug) {
        window.location.href = '/dashboard';
        return;
      }

      const modules = await initTopnav('', slug);

      const currentIndex = modules.findIndex(m => m.slug === slug);
      if (currentIndex === -1) {
        window.location.href = '/dashboard';
        return;
      }

      const mod = modules[currentIndex];
      const prev = currentIndex > 0 ? modules[currentIndex - 1] : null;
      const next = currentIndex < modules.length - 1 ? modules[currentIndex + 1] : null;

      document.title = mod.title + ' — Scale Enterprises';

      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <div style="margin-bottom:1.5rem;">
          <a href="/dashboard" style="color:var(--muted);text-decoration:none;font-size:0.85rem;">
            &larr; Back to Dashboard
          </a>
        </div>

        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">
          <span class="module-number" style="margin-bottom:0;">Masterclass ${String(currentIndex + 1).padStart(2, '0')}</span>
          ${mod.completed ? '<span class="module-status completed" style="font-size:0.7rem;">&#10003; Completed</span>' : ''}
        </div>
        <h1 class="page-title">${mod.title}</h1>
        <p class="page-subtitle" style="max-width:40rem;">${mod.description}</p>

        <!-- Video + Buildout Form Row -->
        <div class="module-row">
          <!-- Video Area -->
          <div class="module-video-col">
            <div class="video-wrap">
              <div class="video-topbar">
                <span class="video-topbar-title">${mod.title}</span>
              </div>
              <div class="video-area">
                ${mod.hasVideo
                  ? '<iframe src="" id="videoFrame" allowfullscreen></iframe>'
                  : '<div class="video-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5,3 19,12 5,21"></polygon></svg><p>Content Coming Soon</p><span>Check back for updates</span></div>'
                }
              </div>
            </div>

            <!-- Mark Complete -->
            <div style="margin-top:1rem;">
              <button class="btn-gold" id="completeBtn" style="max-width:20rem;">
                ${mod.completed ? '&#10003; Completed' : 'Mark as Complete'}
              </button>
            </div>
          </div>

          <!-- Custom Buildout Form -->
          <div class="module-form-col">
            <div class="buildout-card">
              <div class="buildout-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              </div>
              <h3 class="buildout-title">Get This Built For You</h3>
              <p class="buildout-sub">Want our team to implement the strategies from this masterclass directly in your business?</p>
              <form id="buildoutForm">
                <div class="form-group">
                  <label class="form-label" for="bo-name">Your Name</label>
                  <input class="form-input" type="text" id="bo-name" placeholder="Full name" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="bo-email">Email</label>
                  <input class="form-input" type="email" id="bo-email" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="bo-phone">Phone Number</label>
                  <input class="form-input" type="tel" id="bo-phone" placeholder="(555) 555-5555" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="bo-revenue">Annual Revenue</label>
                  <select class="form-input" id="bo-revenue" required>
                    <option value="">Select your revenue range</option>
                    <option value="Pre-revenue">Pre-revenue</option>
                    <option value="Under $100K">Under $100K</option>
                    <option value="$100K - $250K">$100K - $250K</option>
                    <option value="$250K - $500K">$250K - $500K</option>
                    <option value="$500K - $1M">$500K - $1M</option>
                    <option value="$1M - $3M">$1M - $3M</option>
                    <option value="$3M - $5M">$3M - $5M</option>
                    <option value="$5M - $10M">$5M - $10M</option>
                    <option value="$10M+">$10M+</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label" for="bo-industry">Industry</label>
                  <select class="form-input" id="bo-industry" required>
                    <option value="">Select your industry</option>
                    <option value="Agency / Marketing">Agency / Marketing</option>
                    <option value="Coaching / Consulting">Coaching / Consulting</option>
                    <option value="Construction / Trades">Construction / Trades</option>
                    <option value="E-Commerce / Retail">E-Commerce / Retail</option>
                    <option value="Finance / Accounting">Finance / Accounting</option>
                    <option value="Health / Wellness">Health / Wellness</option>
                    <option value="IT / Software">IT / Software</option>
                    <option value="Legal">Legal</option>
                    <option value="Manufacturing">Manufacturing</option>
                    <option value="Real Estate">Real Estate</option>
                    <option value="Restaurant / Hospitality">Restaurant / Hospitality</option>
                    <option value="SaaS">SaaS</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <button type="submit" class="btn-gold" id="buildoutBtn">Request Custom Buildout</button>
              </form>
              <div class="buildout-success" id="buildoutSuccess">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:32px;height:32px;color:var(--success);margin-bottom:0.5rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <p>Request submitted! We'll be in touch soon.</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Resources Section -->
        <div class="resources-section" id="resourcesSection">
          <h2>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Module Resources
          </h2>
          <div id="resourcesList"><p class="no-resources">Loading resources...</p></div>
        </div>

        <!-- Prev / Next -->
        <div style="display:flex;justify-content:space-between;max-width:48rem;gap:1rem;margin-top:2.5rem;">
          ${prev
            ? '<a href="/module?slug=' + prev.slug + '" class="btn-outline" style="flex:1;">&larr; ' + prev.title + '</a>'
            : '<div></div>'
          }
          ${next
            ? '<a href="/module?slug=' + next.slug + '" class="btn-outline" style="flex:1;text-align:right;">' + next.title + ' &rarr;</a>'
            : '<div></div>'
          }
        </div>
      `;

      // Mark complete handler
      var completeBtn = document.getElementById('completeBtn');
      if (!mod.completed) {
        completeBtn.addEventListener('click', async function() {
          completeBtn.disabled = true;
          completeBtn.textContent = 'Saving...';
          try {
            var res = await fetch('/api/modules/' + slug + '/complete', {
              method: 'POST', credentials: 'same-origin'
            });
            if (res.ok) {
              completeBtn.innerHTML = '&#10003; Completed';
              completeBtn.style.background = 'var(--success)';
              // Update the masterclass bar pill
              var mcLinks = document.querySelectorAll('.mc-link');
              mcLinks.forEach(function(link) {
                if (link.href && link.href.includes('slug=' + slug)) {
                  link.classList.add('completed');
                }
              });
            }
          } catch {
            completeBtn.textContent = 'Mark as Complete';
            completeBtn.disabled = false;
          }
        });
      } else {
        completeBtn.style.background = 'var(--success)';
        completeBtn.style.cursor = 'default';
      }

      // Auto-fill buildout form with user info
      var u = window.__user || {};
      document.getElementById('bo-name').value = ((u.firstName || '') + ' ' + (u.lastName || '')).trim();
      document.getElementById('bo-email').value = u.email || '';
      if (u.annualRevenue) document.getElementById('bo-revenue').value = u.annualRevenue;
      if (u.industry) document.getElementById('bo-industry').value = u.industry;

      // Buildout form handler — routes based on revenue
      document.getElementById('buildoutForm').addEventListener('submit', async function(ev) {
        ev.preventDefault();
        var btn = document.getElementById('buildoutBtn');
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        var revenue = document.getElementById('bo-revenue').value;
        var qualified = ['$500K - $1M', '$1M - $3M', '$3M - $5M', '$5M - $10M', '$10M+'].includes(revenue);

        try {
          await fetch('https://scale-enterprises-site.vercel.app/api/buildout-request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: document.getElementById('bo-name').value,
              email: document.getElementById('bo-email').value,
              phone: document.getElementById('bo-phone').value,
              revenue: revenue,
              industry: document.getElementById('bo-industry').value,
              module: mod.title,
              moduleSlug: slug,
              qualified: qualified
            })
          });

          if (qualified) {
            openComingSoonModal();
          } else {
            window.location.href = 'https://scaleenterprises.com/not-a-fit.html';
          }
        } catch {
          btn.disabled = false;
          btn.textContent = 'Request Custom Buildout';
          showToast('Something went wrong. Please try again.', 'error');
        }
      });

      // Load resources
      loadResources(slug);

    });

    async function loadResources(slug) {
      var list = document.getElementById('resourcesList');
      try {
        var res = await fetch('/api/modules/' + slug + '/resources', { credentials: 'same-origin' });
        if (res.ok) {
          var data = await res.json();
          var resources = data.resources || [];
          if (resources.length === 0) {
            list.innerHTML = '<p class="no-resources">No resources available for this module yet.</p>';
          } else {
            list.innerHTML = resources.map(function(r) {
              if (r.type === 'prompt' && r.content) {
                return '<div class="prompt-content">' +
                  '<div class="resource-title">' + escapeHtml(r.title) + '</div>' +
                  '<div class="prompt-text">' + escapeHtml(r.content) + '</div>' +
                  '<button class="copy-btn" onclick="copyPrompt(this)">Copy Prompt</button>' +
                '</div>';
              }
              var iconClass = r.type === 'pdf' ? 'pdf' : r.type === 'prompt' ? 'prompt' : 'link';
              var iconSvg = r.type === 'pdf'
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
              return '<a href="' + escapeHtml(r.url) + '" target="_blank" class="resource-item">' +
                '<div class="resource-icon ' + iconClass + '">' + iconSvg + '</div>' +
                '<div class="resource-info">' +
                  '<div class="resource-title">' + escapeHtml(r.title) + '</div>' +
                  '<div class="resource-type">' + r.type.toUpperCase() + '</div>' +
                '</div>' +
                '<svg class="resource-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>' +
              '</a>';
            }).join('');
          }
        }
      } catch {
        list.innerHTML = '<p class="no-resources">Could not load resources.</p>';
      }
    }

    function copyPrompt(btn) {
      var text = btn.previousElementSibling.textContent;
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy Prompt'; }, 2000);
      });
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
