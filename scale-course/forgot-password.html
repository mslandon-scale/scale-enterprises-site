<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wc7ebmnu6p");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>Forgot Password — Scale Enterprises</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand"><img src="/logo.png" alt="Scale Enterprises"><span>Scale Enterprises</span></div>
      <h1 class="auth-heading">Reset Your Password</h1>
      <p class="auth-sub">Enter your email and we'll send you a link to reset your password.</p>

      <div class="auth-error" id="errorBox"></div>

      <div class="auth-success" id="successBox"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" placeholder="you@company.com" required>
        </div>
        <button type="submit" class="btn-gold" id="submitBtn">Send Reset Link</button>
      </form>

      <p class="auth-footer">
        Remember your password? <a href="/">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorBox = document.getElementById('errorBox');
      const successBox = document.getElementById('successBox');
      errorBox.classList.remove('show');
      successBox.classList.remove('show');

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.error || 'Something went wrong';
          errorBox.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Send Reset Link';
          return;
        }

        successBox.textContent = 'Check your email — if an account exists, we sent a reset link.';
        successBox.classList.add('show');
        document.getElementById('forgotForm').style.display = 'none';
      } catch {
        errorBox.textContent = 'Something went wrong. Please try again.';
        errorBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
