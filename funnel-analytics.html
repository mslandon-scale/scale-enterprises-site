<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funnel Analytics | Scale Enterprises</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="SE ICON DESIGN WHITE.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --azure: #060CB6; --azure-bright: #1A22E6; --bg: #0A0A12; --card: #111120;
      --border: #1E1E35; --white: #FFFFFF; --gray-200: #E8E8ED; --gray-300: #CCCCDD;
      --gray-400: #9999AA; --gray-600: #666677; --green: #22C55E; --green-dim: rgba(34,197,94,0.15);
      --red: #EF4444; --red-dim: rgba(239,68,68,0.15); --yellow: #EAB308; --yellow-dim: rgba(234,179,8,0.15);
    }
    html { font-size: 15px; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--white); line-height: 1.6; }
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
    h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 16px; }

    /* Login */
    .login-box { max-width: 400px; margin: 120px auto; text-align: center; }
    .login-box h1 { margin-bottom: 24px; }
    .login-input { width: 100%; padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-family: inherit; font-size: 0.9rem; margin-bottom: 16px; }
    .login-input:focus { outline: none; border-color: var(--azure); }

    /* Buttons */
    .btn { display: inline-block; padding: 12px 24px; background: var(--azure); color: var(--white); border: none; border-radius: 8px; font-family: inherit; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: var(--azure-bright); }
    .btn--sm { padding: 8px 16px; font-size: 0.75rem; }
    .btn--outline { background: transparent; border: 1px solid var(--border); color: var(--gray-300); }
    .btn--outline:hover { border-color: var(--gray-400); background: rgba(255,255,255,0.03); }
    .btn--red { background: var(--red); } .btn--red:hover { background: #DC2626; }
    .btn--green { background: var(--green); } .btn--green:hover { background: #16A34A; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
    .tab { padding: 12px 24px; font-size: 0.85rem; font-weight: 700; color: var(--gray-400); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab:hover { color: var(--gray-200); }
    .tab.active { color: var(--white); border-bottom-color: var(--azure); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Stat cards */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-400); margin-bottom: 8px; }
    .stat-value { font-size: 1.8rem; font-weight: 800; }
    .stat-sub { font-size: 0.75rem; color: var(--gray-400); margin-top: 4px; }

    /* Funnel visualization */
    .funnel-bar { margin-bottom: 12px; }
    .funnel-bar-header { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 4px; }
    .funnel-bar-label { font-weight: 600; }
    .funnel-bar-value { color: var(--gray-300); }
    .funnel-bar-track { height: 32px; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; }
    .funnel-bar-fill { height: 100%; background: var(--azure); border-radius: 6px; transition: width 0.5s; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 0.7rem; font-weight: 700; min-width: 40px; }
    .funnel-arrow { text-align: center; color: var(--gray-600); font-size: 0.75rem; margin: 4px 0; }

    /* Cards & Tables */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 24px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .results-table { width: 100%; border-collapse: collapse; }
    .results-table th { text-align: left; padding: 10px 16px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-400); border-bottom: 1px solid var(--border); }
    .results-table td { padding: 12px 16px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .results-table tr:last-child td { border-bottom: none; }

    /* Status badges */
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
    .status-active { background: var(--green-dim); color: var(--green); }
    .status-paused { background: var(--yellow-dim); color: var(--yellow); }
    .status-completed { background: rgba(255,255,255,0.06); color: var(--gray-400); }

    .rate { font-weight: 700; font-size: 1rem; }
    .improvement { font-weight: 700; font-size: 0.85rem; }
    .improvement--positive { color: var(--green); }
    .improvement--negative { color: var(--red); }
    .significance { padding: 12px 16px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 16px; }
    .sig-high { background: var(--green-dim); color: var(--green); }
    .sig-medium { background: var(--yellow-dim); color: var(--yellow); }
    .sig-low { background: rgba(255,255,255,0.04); color: var(--gray-400); }

    /* Form controls */
    .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .create-form { display: none; } .create-form.open { display: block; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-400); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-family: inherit; font-size: 0.85rem; }
    .form-input:focus { outline: none; border-color: var(--azure); }
    .form-row { display: flex; gap: 12px; } .form-row .form-group { flex: 1; }
    .weight-control { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
    .weight-input { width: 60px; padding: 6px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--white); font-family: inherit; font-size: 0.85rem; text-align: center; }
    .weight-label { color: var(--gray-400); font-size: 0.8rem; min-width: 100px; }
    .snippet-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.75rem; color: var(--gray-300); overflow-x: auto; white-space: pre; margin-top: 12px; margin-bottom: 8px; }
    .copy-btn { font-size: 0.7rem; color: var(--azure-bright); cursor: pointer; background: none; border: none; font-family: inherit; font-weight: 600; }
    .period-select { padding: 6px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--white); font-family: inherit; font-size: 0.8rem; }

    @media (max-width: 640px) {
      .form-row { flex-direction: column; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .results-table th, .results-table td { padding: 10px 8px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen" class="login-box">
    <h1>Funnel Analytics</h1>
    <p style="color: var(--gray-400); font-size: 0.85rem; margin-bottom: 24px;">Enter your admin key to continue</p>
    <input type="password" id="admin-key-input" class="login-input" placeholder="Admin Key" autofocus>
    <button class="btn" onclick="login()" style="width: 100%;">Sign In</button>
    <p id="login-error" style="color: var(--red); font-size: 0.8rem; margin-top: 12px; display: none;">Invalid key</p>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="container" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px;">
      <h1>Funnel Analytics</h1>
      <div class="controls">
        <select class="period-select" id="period-select" onchange="loadAll()">
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30" selected>Last 30 days</option>
          <option value="90">Last 90 days</option>
        </select>
        <button class="btn btn--sm" onclick="loadAll()">Refresh</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('overview')">Overview</div>
      <div class="tab" onclick="switchTab('pages')">Pages</div>
      <div class="tab" onclick="switchTab('sources')">Traffic Sources</div>
      <div class="tab" onclick="switchTab('splits')">Split Tests</div>
    </div>

    <!-- Overview Tab -->
    <div id="tab-overview" class="tab-content active">
      <div id="stat-cards" class="stat-grid"></div>
      <div class="card">
        <h2>Conversion Funnel</h2>
        <div id="funnel-viz"></div>
      </div>
      <div class="card">
        <h2>Recent Applications</h2>
        <div id="recent-apps"></div>
      </div>
    </div>

    <!-- Pages Tab -->
    <div id="tab-pages" class="tab-content">
      <div class="card">
        <h2>Page Performance</h2>
        <div id="pages-table"></div>
      </div>
    </div>

    <!-- Traffic Sources Tab -->
    <div id="tab-sources" class="tab-content">
      <div class="card">
        <h2>Traffic Sources</h2>
        <div id="sources-table"></div>
      </div>
    </div>

    <!-- Split Tests Tab -->
    <div id="tab-splits" class="tab-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin-bottom: 0;">Split Tests</h2>
        <button class="btn btn--sm btn--outline" onclick="toggleCreateForm()">+ New Test</button>
      </div>
      <div id="create-form" class="card create-form">
        <h3 style="font-size: 0.95rem; margin-bottom: 20px;">Create New Split Test</h3>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Test Name</label><input type="text" id="new-test-name" class="form-input" placeholder="e.g. Homepage Headline Test"></div>
          <div class="form-group"><label class="form-label">Test ID (slug)</label><input type="text" id="new-test-id" class="form-input" placeholder="e.g. homepage-headline-v2"></div>
        </div>
        <div class="form-group"><label class="form-label">Original Page Path</label><input type="text" id="new-original-path" class="form-input" placeholder="/index.html" value="/index.html"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Control Path</label><input type="text" id="new-control-path" class="form-input" value="/index.html"></div>
          <div class="form-group"><label class="form-label">Variant B Path</label><input type="text" id="new-variant-path" class="form-input" placeholder="/index-b.html"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Control Weight</label><input type="number" id="new-control-weight" class="form-input" value="50" min="0" max="100"></div>
          <div class="form-group"><label class="form-label">Variant B Weight</label><input type="number" id="new-variant-weight" class="form-input" value="50" min="0" max="100"></div>
        </div>
        <div style="display: flex; gap: 8px; margin-top: 8px;">
          <button class="btn btn--sm" onclick="createTest()">Create Test</button>
          <button class="btn btn--sm btn--outline" onclick="toggleCreateForm()">Cancel</button>
        </div>
      </div>
      <div id="tests-list"></div>
    </div>
  </div>

  <script>
    var API_BASE = 'https://scale-enterprises-site.vercel.app';
    var adminKey = '';

    // --- Login ---
    document.getElementById('admin-key-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });

    function login() {
      adminKey = document.getElementById('admin-key-input').value.trim();
      if (!adminKey) return;
      fetch(API_BASE + '/api/analytics?days=7', { headers: { 'Authorization': 'Bearer ' + adminKey } })
        .then(function(r) { if (r.ok) { localStorage.setItem('_se_ab_key', adminKey); document.getElementById('login-screen').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; loadAll(); } else { throw new Error(); } })
        .catch(function() { document.getElementById('login-error').style.display = 'block'; });
    }

    var storedKey = localStorage.getItem('_se_ab_key');
    if (storedKey) { document.getElementById('admin-key-input').value = storedKey; login(); }

    // --- Tabs ---
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
      document.querySelector('.tab-content#tab-' + name).classList.add('active');
      event.target.classList.add('active');
    }

    // --- API ---
    function apiGet(path) { return fetch(API_BASE + path, { headers: { 'Authorization': 'Bearer ' + adminKey } }).then(function(r) { return r.json(); }); }
    function apiPost(path, body) { return fetch(API_BASE + path, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminKey }, body: JSON.stringify(body) }).then(function(r) { return r.json(); }); }

    function loadAll() {
      var days = document.getElementById('period-select').value;
      apiGet('/api/analytics?days=' + days).then(renderAnalytics);
      apiGet('/api/ab?route=results').then(function(d) { renderTests(d.tests); });
    }

    // --- Render Analytics ---
    function renderAnalytics(data) {
      // Stat cards
      var f = data.funnel;
      var totalViews = 0; data.pages.forEach(function(p) { totalViews += p.total_views; });
      var uniqueTotal = 0; data.daily.forEach(function(d) { uniqueTotal += d.unique_visitors; });

      document.getElementById('stat-cards').innerHTML =
        statCard('Total Page Views', totalViews.toLocaleString(), data.period_days + ' day period') +
        statCard('Landing Page Views', f.landing_views.toLocaleString(), 'Unique visitors') +
        statCard('Applications', f.total_applications.toLocaleString(), f.application_rate + '% of visitors') +
        statCard('Qualified', f.qualified.toLocaleString(), f.qualification_rate + '% qualification rate') +
        statCard('Not Qualified', f.not_qualified.toLocaleString(), '');

      // Funnel
      var maxVal = Math.max(f.landing_views, 1);
      var funnelHtml = '';
      funnelHtml += funnelBar('Landing Page Views', f.landing_views, f.landing_views / maxVal * 100, '');
      funnelHtml += funnelArrow(f.application_rate + '% applied');
      funnelHtml += funnelBar('Applications Submitted', f.total_applications, f.total_applications / maxVal * 100, '');
      funnelHtml += funnelArrow(f.qualification_rate + '% qualified');
      funnelHtml += funnelBar('Qualified Leads', f.qualified, f.qualified / maxVal * 100, '');
      document.getElementById('funnel-viz').innerHTML = funnelHtml;

      // Pages table
      var pHtml = '<table class="results-table"><thead><tr><th>Page</th><th>Total Views</th><th>Unique Visitors</th></tr></thead><tbody>';
      data.pages.forEach(function(p) {
        pHtml += '<tr><td>' + escHtml(p.path) + '</td><td>' + p.total_views.toLocaleString() + '</td><td>' + p.unique_visitors.toLocaleString() + '</td></tr>';
      });
      pHtml += '</tbody></table>';
      if (data.pages.length === 0) pHtml = '<p style="color: var(--gray-400); text-align: center; padding: 40px;">No page view data yet</p>';
      document.getElementById('pages-table').innerHTML = pHtml;

      // Traffic sources
      var sHtml = '<table class="results-table"><thead><tr><th>Source</th><th>Views</th><th>Unique Visitors</th></tr></thead><tbody>';
      data.traffic_sources.forEach(function(s) {
        sHtml += '<tr><td>' + escHtml(s.source) + '</td><td>' + s.views.toLocaleString() + '</td><td>' + s.unique_visitors.toLocaleString() + '</td></tr>';
      });
      sHtml += '</tbody></table>';
      if (data.traffic_sources.length === 0) sHtml = '<p style="color: var(--gray-400); text-align: center; padding: 40px;">No traffic source data yet</p>';
      document.getElementById('sources-table').innerHTML = sHtml;

      // Recent applications
      var aHtml = '<table class="results-table"><thead><tr><th>Name</th><th>Email</th><th>Revenue</th><th>Status</th><th>Date</th></tr></thead><tbody>';
      data.recent_applications.forEach(function(a) {
        var badge = a.qualified ? '<span class="status-badge status-active">Qualified</span>' : '<span class="status-badge" style="background:var(--red-dim);color:var(--red);">Not Qualified</span>';
        aHtml += '<tr><td>' + escHtml(a.name || '—') + '</td><td style="font-size:0.8rem;">' + escHtml(a.email) + '</td><td>' + escHtml(a.revenue || '—') + '</td><td>' + badge + '</td><td style="font-size:0.8rem;">' + formatDate(a.created_at) + '</td></tr>';
      });
      aHtml += '</tbody></table>';
      if (data.recent_applications.length === 0) aHtml = '<p style="color: var(--gray-400); text-align: center; padding: 40px;">No applications yet</p>';
      document.getElementById('recent-apps').innerHTML = aHtml;
    }

    // --- Render Split Tests ---
    function renderTests(tests) {
      var container = document.getElementById('tests-list');
      if (!tests || tests.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray-400);">No split tests yet. Create one to get started.</div>'; return; }

      var html = '';
      for (var i = 0; i < tests.length; i++) {
        var t = tests[i];
        var totalViews = 0, totalConversions = 0;
        t.variants.forEach(function(v) { totalViews += v.views; totalConversions += v.conversions; });

        html += '<div class="card">';
        html += '<div class="card-header"><div><strong style="font-size:1.05rem;">' + escHtml(t.test_name) + '</strong>';
        html += '<div style="font-size:0.75rem;color:var(--gray-400);margin-top:4px;">' + escHtml(t.test_id) + ' &middot; ' + totalViews + ' views &middot; ' + totalConversions + ' conversions &middot; ' + formatDate(t.created_at) + '</div></div>';
        html += '<span class="status-badge status-' + t.status + '">' + t.status + '</span></div>';

        html += '<table class="results-table"><thead><tr><th>Variant</th><th>Weight</th><th>Views</th><th>Conversions</th><th>Rate</th><th>vs Control</th></tr></thead><tbody>';
        var cRate = t.variants.length > 0 ? t.variants[0].rate : 0;
        t.variants.forEach(function(v, vi) {
          var imp = '';
          if (vi > 0 && cRate > 0) { var pc = ((v.rate - cRate) / cRate * 100).toFixed(1); imp = '<span class="improvement ' + (parseFloat(pc) >= 0 ? 'improvement--positive' : 'improvement--negative') + '">' + (parseFloat(pc) >= 0 ? '+' : '') + pc + '%</span>'; }
          else if (vi === 0) imp = '<span style="color:var(--gray-600);">Control</span>';
          html += '<tr><td><strong>' + escHtml(v.id) + '</strong><br><span style="font-size:0.75rem;color:var(--gray-400)">' + escHtml(v.path) + '</span></td><td>' + v.weight + '%</td><td>' + v.views.toLocaleString() + '</td><td>' + v.conversions.toLocaleString() + '</td><td class="rate">' + v.rate.toFixed(2) + '%</td><td>' + imp + '</td></tr>';
        });
        html += '</tbody></table>';

        if (t.significance) {
          var sc = 'sig-low', st = '';
          if (t.significance.confidence >= 95) { sc = 'sig-high'; st = 'Winner: <strong>' + escHtml(t.significance.winner) + '</strong> with ' + t.significance.confidence + '% confidence'; }
          else if (t.significance.confidence >= 80) { sc = 'sig-medium'; st = 'Trending: ' + t.significance.confidence + '% confidence &mdash; need more data'; }
          else { st = t.significance.confidence + '% confidence &mdash; not enough data yet'; }
          html += '<div class="significance ' + sc + '">' + st + '</div>';
        }

        // Controls
        html += '<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">';
        html += '<div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gray-400);margin-bottom:8px;">Traffic Split</div>';
        t.variants.forEach(function(v) {
          html += '<div class="weight-control"><span class="weight-label">' + escHtml(v.id) + '</span><input type="number" class="weight-input" id="weight-' + t.test_id + '-' + v.id + '" value="' + v.weight + '" min="0" max="100"><span style="color:var(--gray-600);font-size:0.8rem;">%</span></div>';
        });
        html += '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">';
        html += '<button class="btn btn--sm" onclick="updateWeights(\'' + t.test_id + '\',' + JSON.stringify(t.variants.map(function(v){return v.id;})) + ')">Save Weights</button>';
        if (t.status === 'active') html += '<button class="btn btn--sm btn--outline" onclick="updateStatus(\'' + t.test_id + '\',\'paused\')">Pause</button>';
        else if (t.status === 'paused') { html += '<button class="btn btn--sm btn--green" onclick="updateStatus(\'' + t.test_id + '\',\'active\')">Resume</button>'; html += '<button class="btn btn--sm btn--outline" onclick="updateStatus(\'' + t.test_id + '\',\'completed\')">Complete</button>'; }
        html += '<button class="btn btn--sm btn--red" onclick="deleteTest(\'' + t.test_id + '\')">Delete</button></div></div>';

        // Snippet
        html += '<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">';
        html += '<div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gray-400);margin-bottom:4px;">Page Snippet</div>';
        var snip = '<script>window.__AB_TESTS=[' + JSON.stringify({test_id:t.test_id,original_path:t.original_path,variants:t.variants.map(function(v){return{id:v.id,path:v.path,weight:v.weight};})}) + '];<\/script>';
        html += '<div class="snippet-box" id="snippet-' + t.test_id + '">' + escHtml(snip) + '</div>';
        html += '<button class="copy-btn" onclick="copySnippet(\'' + t.test_id + '\')">Copy to clipboard</button></div>';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    // --- Actions ---
    function toggleCreateForm() { document.getElementById('create-form').classList.toggle('open'); }

    function createTest() {
      var tn = document.getElementById('new-test-name').value.trim(), ti = document.getElementById('new-test-id').value.trim();
      var op = document.getElementById('new-original-path').value.trim(), cp = document.getElementById('new-control-path').value.trim();
      var vp = document.getElementById('new-variant-path').value.trim();
      var cw = parseInt(document.getElementById('new-control-weight').value) || 50;
      var vw = parseInt(document.getElementById('new-variant-weight').value) || 50;
      if (!tn || !ti || !op || !cp || !vp) { alert('Please fill in all fields'); return; }
      apiPost('/api/ab?route=admin', { action:'create', test_id:ti, test_name:tn, original_path:op, variants:[{id:'control',path:cp,weight:cw},{id:'variant-b',path:vp,weight:vw}] })
        .then(function(d) { if(d.success) { toggleCreateForm(); loadAll(); } else alert(d.error); });
    }

    function updateStatus(id, s) { apiPost('/api/ab?route=admin', {action:'update_status',test_id:id,status:s}).then(loadAll); }
    function updateWeights(id, vids) {
      var vs = vids.map(function(vid) { return {id:vid, weight:parseInt(document.getElementById('weight-'+id+'-'+vid).value)||0}; });
      apiPost('/api/ab?route=admin', {action:'update_weights',test_id:id,variants:vs}).then(loadAll);
    }
    function deleteTest(id) { if(!confirm('Delete this test and all data?')) return; apiPost('/api/ab?route=admin',{action:'delete',test_id:id}).then(loadAll); }
    function copySnippet(id) { navigator.clipboard.writeText(document.getElementById('snippet-'+id).textContent).then(function(){alert('Copied!');}); }

    // --- Helpers ---
    function statCard(label, value, sub) { return '<div class="stat-card"><div class="stat-label">' + label + '</div><div class="stat-value">' + value + '</div>' + (sub ? '<div class="stat-sub">' + sub + '</div>' : '') + '</div>'; }
    function funnelBar(label, value, pct, extra) { return '<div class="funnel-bar"><div class="funnel-bar-header"><span class="funnel-bar-label">' + label + '</span><span class="funnel-bar-value">' + value.toLocaleString() + '</span></div><div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:' + Math.max(pct, 3) + '%;">' + Math.round(pct) + '%</div></div></div>'; }
    function funnelArrow(text) { return '<div class="funnel-arrow">' + text + '</div>'; }
    function escHtml(s) { var d=document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
    function formatDate(iso) { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  </script>
</body>
</html>
